<!DOCTYPE html>
<html lang="el">
<head>
<meta charset="UTF-8">
<title>Valentine 💖</title>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<style>
  body {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #ff758c, #ff7eb3);
    overflow: hidden;
    text-align: center;
  }

  .card {
    background: rgba(255,255,255,0.15);
    backdrop-filter: blur(15px);
    padding: 30px;
    border-radius: 20px;
    width: 90%;
    max-width: 350px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.2);
  }

  h1 {
    color: white;
    font-size: 1.6em;
    margin-bottom: 25px;
  }

  .buttons {
    position: relative;
    height: 120px;
  }

  button {
    padding: 15px 20px;
    font-size: 16px;
    border: none;
    border-radius: 12px;
    cursor: pointer;
    position: absolute;
    transition: 0.2s;
  }

  #yes {
    background: #00c853;
    color: white;
    left: 20px;
    top: 40px;
  }

  #no {
    background: #ff1744;
    color: white;
    left: 160px;
    top: 40px;
  }

  #message {
    display: none;
    margin-top: 20px;
    font-size: 1.6em;
    color: white;
  }
</style>
</head>

<body>

<div class="card">
  <h1>Would you be my Valentine? 💘</h1>

  <div class="buttons">
    <button id="yes">Yes 💖</button>
    <button id="no">No 😈</button>
  </div>

  <div id="message">YEEESSS 🥰💞</div>
</div>

<audio id="sound" src="love.mp3"></audio>

<script>
const webhookURL = "PASTE_WEBHOOK_HERE";

function sendToDiscord(text) {
  fetch(webhookURL, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ content: text })
  });
}

// NO button logic
const noBtn = document.getElementById("no");

const texts = [
  "Όχι 😈",
  "Σκέψου το 🤨",
  "Έλα ρε 😭",
  "Μόνο ένα YES 😏",
  "Τελευταία ευκαιρία 😳"
];

let i = 0;
let size = 1;

noBtn.addEventListener("click", () => {
  sendToDiscord("NO 😈 πατήθηκε");

  i++;
  if (i < texts.length) {
    noBtn.innerText = texts[i];
  }

  size -= 0.12;
  noBtn.style.transform = `scale(${size})`;

  if (size <= 0.35) {
    noBtn.style.display = "none";
  }
});

// YES button logic
document.getElementById("yes").addEventListener("click", () => {
  sendToDiscord("YES 💖 πατήθηκε");

  document.getElementById("message").style.display = "block";
  document.getElementById("sound").play();

  confetti({
    particleCount: 200,
    spread: 100,
    origin: { y: 0.6 }
  });
});
</script>

</body>
</html>
